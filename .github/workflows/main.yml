name: Build Poco F1 Docker Kernel 4.19 (KernelSU)

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git ccache build-essential zip curl python3 bc libncurses5-dev

    - name: Fetch toolchains
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p kernel_workspace
        cd kernel_workspace
        git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r487747c clang-aosp
        git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc-64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc-32

    - name: Clone kernel & clean
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive --depth=1 https://github.com/duckyduckG/android_kernel_xiaomi_sdm845_419.git android-kernel
        cd android-kernel
        sed -i 's/ -dirty//g' scripts/setlocalversion
        make clean

    - name: Add DTs & Techpack
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # Force-delete the placeholder folders first
        rm -rf arch/arm64/boot/dts/qcom-sdm845
        rm -rf arch/arm64/boot/dts/xiaomi
        rm -rf techpack/mi845
        
        # Now clone the real device trees and techpack into those spots
        git clone --depth=1 https://github.com/duckyduckG/devicetree_qcom-sdm845_419.git arch/arm64/boot/dts/qcom-sdm845
        git clone --depth=1 https://github.com/duckyduckG/devicetree_xiaomi_419.git arch/arm64/boot/dts/xiaomi
        git clone --depth=1 https://github.com/duckyduckG/kernel_techpack_mi845_419.git techpack/mi845

    - name: Apply KernelSU-Next
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -
        cd KernelSU-Next
        echo "KSUVER=$(git rev-list --count HEAD)" >> $GITHUB_ENV

    - name: Fake Missing Xiaomi Touch Firmware
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # Move into the problematic touch driver folder
        cd drivers/input/touchscreen/xiaomi/focaltech_touch_mi/
        
        # 1. Create the base folders just to be safe
        mkdir -p include/pramboot/
        mkdir -p include/firmware/
        
        # 2. Add the specific ones we already know about
        echo "0x00" > include/pramboot/FT8719_Pramboot_V0.5_20171221.i
        echo "0x00" > include/firmware/fw_sample.i
        echo "0x00" > include/firmware/fw_ft8719_e10.i
        echo "0x00" > include/firmware/fw_ft3518_e5.i
        echo "0x00" > include/firmware/fw_ft8719_tianma.i
        echo "0x00" > include/firmware/fw_ft8719_ebbg.i
        echo "0x00" > include/firmware/fw_ft8719_boe.i
        
        # 3. The Hacker Sweeper: Automatically scan the source code for ANY other missing .i files 
        # and instantly create a fake 0x00 file for them so the compiler never crashes again!
        grep -rh "\.i\"" . | grep -o 'include/[^"]*\.i' | sort -u | while read -r fw_file; do
            mkdir -p "$(dirname "$fw_file")"
            echo "0x00" > "$fw_file"
            echo "Dynamically faked: $fw_file"
        done
        
    - name: Build Image.gz-dtb with Docker Flags
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export ARCH=arm64 SUBARCH=arm
        export PATH=$PWD/../clang-aosp/bin:$PWD/../gcc-64/bin:$PWD/../gcc-32/bin:$PATH
        export KBUILD_BUILD_USER=${{ github.actor }} KBUILD_BUILD_HOST=Github
        BA="CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-"
        EX="LD=ld.lld LLVM=1 LLVM_IAS=1"

        echo "Using defconfig: vendor/sdm845-perf_defconfig"
        make O=out ARCH=arm64 CC=clang $BA $EX vendor/sdm845-perf_defconfig

        echo "Appending Xiaomi configs"
        cat arch/arm64/configs/vendor/xiaomi/sdm845-common.config >> out/.config || true
        cat arch/arm64/configs/vendor/xiaomi/beryllium.config >> out/.config || true

        echo "Injecting Docker Flags"
        cat << 'EOF' >> out/.config
        CONFIG_NAMESPACES=y
        CONFIG_NET_NS=y
        CONFIG_PID_NS=y
        CONFIG_IPC_NS=y
        CONFIG_UTS_NS=y
        CONFIG_USER_NS=y
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_CPUSETS=y
        CONFIG_MEMCG=y
        CONFIG_MEMCG_SWAP=y
        CONFIG_MEMCG_SWAP_ENABLED=y
        CONFIG_CGROUP_PIDS=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_POSIX_MQUEUE_SYSCTL=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_IP_NF_TARGET_MASQUERADE=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y
        CONFIG_IP6_NF_NAT=y
        CONFIG_NF_NAT=y
        CONFIG_IP_VS=y
        CONFIG_IP_VS_RR=y
        CONFIG_IP_VS_NFCT=y
        CONFIG_IP_VS_PROTO_TCP=y
        CONFIG_IP_VS_PROTO_UDP=y
        CONFIG_OVERLAY_FS=y
        CONFIG_BLK_CGROUP=y
        CONFIG_DEBUG_BLK_CGROUP=y
        CONFIG_BLK_DEV_THROTTLING=y
        CONFIG_SECCOMP=y
        CONFIG_SECCOMP_FILTER=y
        CONFIG_KEYS=y
        CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
        CONFIG_NETFILTER_XT_MATCH_IPVS=y
        CONFIG_BPF=y
        CONFIG_BPF_SYSCALL=y
        CONFIG_CGROUP_BPF=y
        CONFIG_MACVLAN=y
        CONFIG_IPVLAN=y
        CONFIG_VXLAN=y
        CONFIG_BRIDGE_VLAN_FILTERING=y
        CONFIG_CFQ_GROUP_IOSCHED=y
        CONFIG_CFS_BANDWIDTH=y
        CONFIG_NET_CLS_CGROUP=y
        CONFIG_CGROUP_NET_PRIO=y
        CONFIG_EXT4_FS_POSIX_ACL=y
        CONFIG_BONDING=n
        EOF

        make O=out ARCH=arm64 CC=clang $BA $EX olddefconfig

        echo "Building DTBs"
        make O=out ARCH=arm64 CC=clang $BA $EX dtbs

        echo "Compiling final Image.gz-dtb"
        make -j$(nproc) O=out ARCH=arm64 CC=clang $BA $EX Image.gz-dtb 2>&1 | tee build.log

        if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "ERROR: Build failed, no Image.gz-dtb produced"
          exit 1
        fi

    - name: Package AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cd AnyKernel3
        cp ../android-kernel/out/arch/arm64/boot/Image.gz-dtb ./
        
        # Replace the risky anykernel.sh with our safe Poco F1 script
        cat << 'EOF' > anykernel.sh
        properties() { '
        kernel.string=Docker KernelSU A16 by Asif
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        do.cleanuponabort=0
        device.name1=beryllium
        device.name2=Poco F1
        device.name3=POCO F1
        '; }
        boot_attributes() {
        set_perm_recursive 0 0 755 644 $RAMDISK/*;
        set_perm_recursive 0 0 750 750 $RAMDISK/init* $RAMDISK/sbin;
        }
        BLOCK=/dev/block/bootdevice/by-name/boot;
        IS_SLOT_DEVICE=0;
        RAMDISK_COMPRESSION=auto;
        PATCH_VBMETA_FLAG=auto;
        . tools/ak3-core.sh;
        dump_boot; 
        write_boot;
        EOF
        
        # Using standard bash variable syntax here instead of GitHub's env syntax
        zip -r $GITHUB_WORKSPACE/AK3-PocoF1-Docker-KernelSU_${KSUVER}.zip ./*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PocoF1-Docker-KernelBuild
        path: |
          kernel_workspace/android-kernel/build.log
          AK3-PocoF1-Docker-KernelSU_*.zip
